<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido a TaskFlow 😼</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section id="login" class="login-section" aria-label="Inicio de sesión">
      <div class="login-wrapper">
        <div class="card box-auth">
          <span class="app-name">Task<strong>Flow</strong></span>

          <header class="login-header">
            <h1>Bienvenido</h1>
            <p>Ingresa los campos necesarios para continuar</p>
          </header>

          <form class="login-form">
            <div class="form-group">
              <label for="login-email">Correo electrónico</label>
              <input type="email" id="login-email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
              <label for="login-password">Contraseña</label>
              <input type="password" id="login-password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-options">
              <a href="recuperar.html" class="link">¿Olvidaste tu contraseña?</a>
              <div class="checkbox-group">
                <input type="checkbox" id="recordar" name="recordar">
                <label for="recordar">Recordar sesión</label>
              </div>
            </div>

            <button type="submit" class="btn btn-primario btn-completo">Ingresar</button>
          </form>

          <div class="divider"><span>o</span></div>

          <div class="social-login">
            <button type="button" class="btn btn-secundario btn-completo">
              <a href="https://www.google.com/?hl=es">Ingresar con Google</a>
            </button>
            <p class="register-text">
              ¿No tienes cuenta? <a href="registrarte.html" class="link">Regístrate, es gratis</a>
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
